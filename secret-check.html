<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>secret check</title>
</head>
<body>
  <script>
    window.parent.postMessage({ type: "probe-alive" }, "*");
  </script>

  <script src="simulated-secret.js"></script>

  <script>
    if (
      typeof window.SIMULATED_SECRET_DO_NOT_USE === "string" &&
      window.SIMULATED_SECRET_DO_NOT_USE.length > 0
    ) {
      window.parent.postMessage(
        {
          type: "secret-detected",
          value: window.SIMULATED_SECRET_DO_NOT_USE
        },
        "*"
      );
    }
  </script>
</body>
</html>
